<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKG Project Manager</title>
    <meta name="description"
        content="Quản lý dự án marketing chuyên nghiệp — Báo cáo HTML từ Markdown, Kanban Task Board">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.1/dist/pocketbase.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">📋</span>
                <span class="logo-text">MKG<span class="logo-accent">PM</span></span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="tasks">
                <span class="nav-icon">📌</span><span class="nav-label">Task Board</span>
            </a>
            <a href="#" class="nav-item" data-page="staff">
                <span class="nav-icon">👥</span><span class="nav-label">Nhân viên</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sync-status" id="syncStatus">
                <span class="sync-dot"></span>
                <span class="sync-text">Đang kết nối...</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="mobile-menu" id="mobileMenu">☰</button>
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <div class="topbar-actions">
                <button class="btn btn-primary" id="newProjectBtn" title="Tạo dự án mới">
                    <span>＋</span> Dự án mới
                </button>
            </div>
        </header>

        <!-- Pages Container -->
        <div class="page-content">
            <!-- Dashboard Page -->
            <section class="page active" id="page-dashboard">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="section-header">
                    <h2>Dự án</h2>
                    <div class="filter-group">
                        <select id="filterStatus" class="select-input">
                            <option value="all">Tất cả</option>
                            <option value="planning">Planning</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="projects-grid" id="projectsGrid"></div>
            </section>

            <!-- Project Detail Page -->
            <section class="page" id="page-project">
                <button class="btn btn-ghost back-btn" id="backBtn">← Quay lại</button>
                <div class="project-header" id="projectHeader"></div>

                <!-- Import MD Zone - always visible -->
                <div class="import-zone" id="importZone">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-icon">📂</div>
                        <div class="drop-zone-text">Kéo thả file <strong>.md</strong> vào đây hoặc</div>
                        <label class="btn btn-primary" style="margin-top:10px;cursor:pointer">
                            📂 Chọn file Markdown
                            <input type="file" accept=".md,.txt,.markdown" id="mdFileInput" hidden>
                        </label>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" data-tab="report">📄 Báo cáo HTML</button>
                    <button class="tab" data-tab="md-viewer">📖 Xem Markdown</button>
                    <button class="tab" data-tab="markdown">✏️ Sửa Markdown</button>
                    <button class="tab" data-tab="project-tasks">✅ Nhiệm vụ</button>
                </div>
                <div class="tab-content active" id="tab-report">
                    <div class="report-actions">
                        <button class="btn btn-outline" id="printReportBtn">🖨️ In báo cáo HTML</button>
                    </div>
                    <div class="report-container" id="reportContainer"></div>
                </div>
                <div class="tab-content" id="tab-md-viewer">
                    <div class="report-actions">
                        <button class="btn btn-outline" id="printMdBtn">🖨️ In Markdown gốc</button>
                    </div>
                    <div class="md-viewer-container" id="mdViewerContainer"></div>
                </div>
                <div class="tab-content" id="tab-markdown">
                    <div class="md-actions">
                        <button class="btn btn-outline" id="extractTasksBtn">🔄 Trích xuất nhiệm vụ từ MD</button>
                    </div>
                    <textarea class="md-editor" id="mdEditor"
                        placeholder="Paste hoặc import nội dung Markdown tại đây..."></textarea>
                    <button class="btn btn-primary" id="saveMdBtn">💾 Lưu Markdown</button>
                </div>
                <div class="tab-content" id="tab-project-tasks">
                    <div class="task-actions">
                        <button class="btn btn-primary" id="addTaskBtn">＋ Thêm nhiệm vụ</button>
                    </div>
                    <div class="task-list" id="projectTaskList"></div>
                </div>
            </section>

            <!-- Task Board Page -->
            <section class="page" id="page-tasks">
                <div class="board-toolbar">
                    <div class="board-filters">
                        <select id="boardFilterProject" class="select-input">
                            <option value="all">Tất cả dự án</option>
                        </select>
                        <select id="boardFilterAssignee" class="select-input">
                            <option value="all">Tất cả nhân viên</option>
                        </select>
                    </div>
                    <div class="view-toggle">
                        <button class="btn btn-sm btn-outline active" id="viewKanban" title="Kanban">▦ Kanban</button>
                        <button class="btn btn-sm btn-outline" id="viewList" title="List">☰ List</button>
                    </div>
                </div>
                <div class="kanban-board" id="kanbanBoard">
                    <div class="kanban-col" data-status="todo">
                        <div class="kanban-col-header"><span class="col-dot todo"></span>To Do <span class="col-count"
                                id="countTodo">0</span></div>
                        <div class="kanban-cards" id="cardsTodo"></div>
                    </div>
                    <div class="kanban-col" data-status="doing">
                        <div class="kanban-col-header"><span class="col-dot doing"></span>Doing <span class="col-count"
                                id="countDoing">0</span></div>
                        <div class="kanban-cards" id="cardsDoing"></div>
                    </div>
                    <div class="kanban-col" data-status="done">
                        <div class="kanban-col-header"><span class="col-dot done"></span>Done <span class="col-count"
                                id="countDone">0</span></div>
                        <div class="kanban-cards" id="cardsDone"></div>
                    </div>
                </div>
                <div class="list-view" id="listView" style="display:none"></div>
            </section>

            <!-- Staff Page -->
            <section class="page" id="page-staff">
                <div class="section-header">
                    <h2>Nhân viên</h2>
                    <button class="btn btn-primary" id="addStaffBtn">＋ Thêm nhân viên</button>
                </div>
                <div class="staff-grid" id="staffGrid"></div>
            </section>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Print container -->
    <div id="printContainer" class="print-only"></div>

    <script src="app.js"></script>
</body>

</html>
